# =========================================================
#  Alacritty config
# =========================================================
[general]
live_config_reload = true

[env]
# Совместимость со старыми серверами по SSH.
# Без этого на старых CentOS/Debian могут быть артефакты
# в vim/tmux/htop (мусор на экране, кривые стрелки).
TERM = "xterm-256color"

# ---------------------------------------------------------
#  Window
# ---------------------------------------------------------
[window]
#opacity = 0.96              # раскомментируй, если хочешь лёгкую прозрачность
padding = { x = 10, y = 10 }
dynamic_padding = true
dynamic_title   = true
#decorations     = "full"

decorations = "none"           # убираем рамку/заголовок
startup_mode = "Maximized"


# ---------------------------------------------------------
#  Font
# ---------------------------------------------------------
[font]
size = 14.0
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold   = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font", style = "Italic" }

# ---------------------------------------------------------
#  Cursor
# ---------------------------------------------------------
[cursor]
style            = { shape = "Block", blinking = "On" }
blink_interval   = 500
unfocused_hollow = true

# ---------------------------------------------------------
#  Mouse / Selection / Scrolling
# ---------------------------------------------------------
[mouse]
hide_when_typing = true

[selection]
save_to_clipboard = true

[scrolling]
history    = 100000
multiplier = 3

# ---------------------------------------------------------
#  Terminal / Shell
# ---------------------------------------------------------
[terminal]
osc52 = "CopyPaste"          # копирование из удалённых сессий в локальный буфер

[terminal.shell]
program = "/usr/bin/zsh"
args    = ["-c", "tmux attach || tmux new-session -s main"]
# =========================================================
#  Colors — Tokyo Night (Storm)
# =========================================================
[colors.primary]
background = "#1a1b26"
foreground = "#c0caf5"

[colors.cursor]
cursor = "#c0caf5"
text   = "#1a1b26"

[colors.selection]
background = "#283457"
text       = "#c0caf5"

[colors.normal]
black   = "#15161e"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#bb9af7"
cyan    = "#7dcfff"
white   = "#a9b1d2"

[colors.bright]
black   = "#414868"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#bb9af7"
cyan    = "#7dcfff"
white   = "#c0caf5"

# =========================================================
#  Hints — открыть URL по Ctrl+Shift+U
# =========================================================
[[hints.enabled]]
command         = "xdg-open"
hyperlinks      = true
post_processing = true
persist         = false
mouse           = { enabled = true, mods = "None" }
binding         = { key = "U", mods = "Control|Shift" }
regex = "(ipfs:|ipns:|magnet:|mailto:|gemini://|gopher://|https://|http://|news:|file:|git://|ssh:|ftp://)[^\\u0000-\\u001F\\u007F-\\u009F<>\"\\s{-}\\^⟨⟩`]+"

# =========================================================
#  Keybindings
# =========================================================

# --- Clipboard ---
[[keyboard.bindings]]
key = "C"
mods = "Control|Shift"
action = "Copy"

[[keyboard.bindings]]
key = "V"
mods = "Control|Shift"
action = "Paste"

# --- Очистить весь scrollback (историю прокрутки) ---
[[keyboard.bindings]]
key = "K"
mods = "Control|Shift"
action = "ClearHistory"

# --- Font size ---
[[keyboard.bindings]]
key = "Plus"
mods = "Control"
action = "IncreaseFontSize"

[[keyboard.bindings]]
key = "Minus"
mods = "Control"
action = "DecreaseFontSize"

[[keyboard.bindings]]
key = "Key0"
mods = "Control"
action = "ResetFontSize"

# --- Vi-mode / Fullscreen ---
[[keyboard.bindings]]
key = "Space"
mods = "Control"
action = "ToggleViMode"
 
