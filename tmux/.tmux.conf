# ═══════════════════════════════════════════════════════════
#  TMUX CONFIG
# ═══════════════════════════════════════════════════════════

# Префикс на Ctrl+a
# Ctrl+a        → префикс tmux
# Ctrl+a Ctrl+a → отправит Ctrl+a в shell (= начало строки)
# Ctrl+a a      → то же самое (альтернатива)
unbind C-b
set -g prefix C-q
bind C-q send-prefix
#bind a   send-prefix

# Базовые настройки
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g history-limit 50000
set -sg escape-time 0
set -g focus-events on
setw -g monitor-activity on
set -g visual-activity off

# Сплиты на - и |
unbind '"'
unbind %
unbind -
unbind |
bind _ split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Навигация по панелям (Vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Ресайз панелей
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Copy mode в стиле Vi
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Подсветка панелей
set -g pane-border-style fg=colour239
set -g pane-active-border-style fg=colour2

# Статус-бар снизу
set -g status-position bottom
set -g status-bg colour236
set -g status-fg white
set -g status-left "#[fg=green]#S #[fg=white]| "
set -g status-right "#[fg=cyan]%Y-%m-%d #[fg=yellow]%H:%M "
set -g status-left-length 40

setw -g window-status-style fg=colour244,bg=colour236
setw -g window-status-current-style fg=colour0,bg=colour34,bold
setw -g window-status-activity-style fg=colour214,bg=colour236
setw -g window-status-format " #I "
setw -g window-status-current-format " #I "

# Цвета
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Reload конфига: Ctrl+a r
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"
